# Special
- type: entity
  parent: FaxMachineBase
  id: SiriusFaxMachineEnclavePresident
  name: Presidential long range fax machine
  suffix: Enclave Presidential
  components:
  - type: Sprite
    layers:
      - state: icon
        map: [ "base" ]
        color: "#bfe3ff"
  - type: FaxMachine
    name: "Presidential Office"
    notifyAdmins: true

