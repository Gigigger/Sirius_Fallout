- type: entity
  id: NVToggleAction
  name: Переключение ПНВ
  description: Переключает ваше ПНВ
  categories: [ HideSpawnMenu ]
  components:
  - type: InstantAction
    icon:
      sprite: Clothing/Eyes/Goggles/nightvision.rsi
      state: icon
    event: !type:NVInstantActionEvent
    useDelay: 0.5
    checkCanInteract: false

- type: entity
  id: SwitchNightVision
  name: Переключение ночного зрения
  description: Переключает ночное зрение
  categories: [ HideSpawnMenu ]
  components:
  - type: InstantAction
    icon:
      sprite: Clothing/Eyes/Goggles/nightvision.rsi
      state: nv
    event: !type:NVInstantActionEvent
    useDelay: 0.5
    checkCanInteract: false
