    sprite: _Horizon/Mobs/Species/Cyberlimbs/organs_bs.rsi
    layers:
      - state: lung-l
      - state: lung-r
  - type: Metabolizer
    removeEmpty: true
    solutionOnBody: false
    solution: "Lung"
    metabolizerTypes: [ Human ]
    groups:
    - id: Gas
      rateModifier: 75.0
  - type: SolutionContainerManager
    solutions:
      Lung:
        maxVol: 7500.0
        canReact: false

