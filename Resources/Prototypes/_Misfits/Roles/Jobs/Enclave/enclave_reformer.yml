# #Misfits Add - The Reformer: admin-only Enclave leadership role above Commander.

- type: job
  id: EnclaveReformer
  setPreference: true
  hideWithoutJobWhitelist: true
  jobWhitelistBypassesRoleTimers: true # bypass faction timelocks — admin-only
  weight: 130
  displayWeight: 130 # keep the Reformer alone at the top of the Enclave rank stack
  # #Misfits Removed - showBorder moved to Commander so the gap appears after Reformer instead of above it
  overrideConsoleVisibility: false
  canBeAntag: false
  name: job-name-enclave-reformer
  description: job-description-enclave-reformer
  playTimeTracker: EnclaveReformer
  requirements:
    - !type:CharacterSpeciesRequirement
      species:
      - Human
    - !type:CharacterDepartmentTimeRequirement # #Misfits Add - admin-only timelock (70h Enclave)
      department: Enclave
      min: 252000 # 70 hours — admin role
    - !type:CharacterSexRequirement
      sex: Male
    - !type:CharacterGenderRequirement
      gender: Male
    - !type:CharacterTraitRequirement
      inverted: true
      traits:
        - N14Muted
        - N14Pacifist
  startingGear: EnclaveReformerGear
  icon: "JobIconEnclaveReformer"
  supervisors: job-supervisors-enclave-reformer
  requireAdminNotify: true
  hideIfPlaytimeRequirementsNotMet: false
  alwaysUseSpawner: true
  accessGroups:
  - EnclaveCommand
  special:
  - !type:AddComponentSpecial
    components:
      - type: NpcFactionMember
        factions:
          - Enclave
      - type: PowerArmorProficiency

- type: startingGear
  id: EnclaveReformerGear
  equipment:
    back: ClothingBackpackSatchelLeather
    jumpsuit: SiriusClothingUniformJumpsuitGovernor
    outerClothing: ClothingOuterCoatGentle
    shoes: ClothingShoesBootsLaceup
    neck: ClothingNeckPinEnclaveGovernor
    belt: ClothingBeltEnclave
    ears: N14ClothingHeadsetEnclave
    pocket1: SiriusRubberStampEnclaveReformer
    pocket2: RadioHandheld
    id: SiriusIDEnclaveReformer
  satchel: N14ClothingBackpackSatchelMilitaryFilled
  duffelbag: N14ClothingBackpackDuffelMilitaryFilled
  storage:
    back:
    - N14BoxPlasticFilledMilitary

- type: playTimeTracker
  id: EnclaveReformer
