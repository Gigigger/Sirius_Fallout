- type: entity
  id: N14BaseMagazine2mmECPistol
  name: pistol magazine (2mmEC)
  parent: BaseItem
  abstract: true
  components:
  - type: Tag
    tags:
      - N14MagazinePistol2mmEC
  - type: BallisticAmmoProvider
    mayTransfer: true
    whitelist:
      tags:
        - N14Cartridge2mmEC
    capacity: 12
  - type: ContainerContainer
    containers:
      ballistic-ammo: !type:Container
  - type: Sprite
    netsync: false
    sprite: _Nuclear14/Objects/Weapons/Guns/Ammunition/Magazines/2mmEC/2mmpistolmag.rsi
    layers:
    - state: base
      map: ["enum.GunVisualLayers.Base"]
    - state: mag-1
      map: ["enum.GunVisualLayers.Mag"]
    scale: 0.70, 0.70
  - type: MagazineVisuals
    magState: mag
    steps: 2
    zeroVisible: false
  - type: Appearance

