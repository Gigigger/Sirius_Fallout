- type: entity
  parent: BaseStructureDynamic
  id: SiriusAutodoc
  name: autodoc
  description: A pre-war medical autodoc, capable of performing complex medical procedures.
  components:
  - type: Sprite
    sprite: _Nuclear14/Structures/Machines/autodoc.rsi
    drawdepth: Mobs
    noRot: true
    offset: 0, 0.5
    layers:
      - state: autodoc_off
        map: ["enum.AutodocVisualLayers.Base"]
      - state: autodoc_door
        map: ["enum.AutodocVisualLayers.Door"]
        visible: false
  - type: InteractionOutline
  - type: Transform
    noRot: true
    anchored: true
  - type: Fixtures
    fixtures:
      fix1:
        shape:
          !type:PhysShapeAabb
          bounds: "-0.5,-0.5,0.5,0.90"
        density: 200
        mask:
          - MachineMask
        layer:
          - MachineLayer
  - type: ContainerContainer
    containers:
      autodoc-body:
        !type:ContainerSlot
        showEnts: true
  - type: Appearance
  - type: SiriusAutodoc
    entryDelay: 2
    treatmentDuration: 10
    isOpen: true
  - type: Damageable
    damageContainer: Inorganic
    damageModifierSet: Metallic
  - type: Destructible
    thresholds:
    - trigger:
        !type:DamageTrigger
        damage: 250
      behaviors:
        - !type:EmptyAllContainersBehaviour
        - !type:PlaySoundBehavior
          sound:
            collection: MetalBreak
        - !type:SpawnEntitiesBehavior
          spawn:
            SheetSteel1:
              min: 4
              max: 8
            CableMVStack:
              min: 3
              max: 6
        - !type:DoActsBehavior
          acts: [ "Destruction" ]
  - type: ApcPowerReceiver
    powerLoad: 2000
  - type: ExtensionCableReceiver
  - type: PointLight
    color: "#4a9eff"
    radius: 2
    energy: 8
    enabled: false
  - type: ActivatableUI
    key: enum.SiriusAutodocUiKey.Key
    requiresComplex: false
  - type: ActivatableUIRequiresPower
  - type: UserInterface
    interfaces:
      enum.SiriusAutodocUiKey.Key:
        type: SiriusAutodocBoundUserInterface
  - type: ItemSlots
    slots:
      siriusBeakerSlot:
        name: siriusBeakerSlot-name
        whitelist:
          components:
            - SolutionContainerManager
            - FitsInDispenser
