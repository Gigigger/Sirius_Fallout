- type: entity
  id: N14FabricatorEnclave
  parent: [BaseLatheLube, BaseMaterialSiloUtilizer]
  name: Enclave Fabricator
  description: A pre-war fully-functioning nanofabricator - a miracle of American industry.
  components:
  - type: Sprite
    sprite: Structures/Machines/protolathe.rsi
    snapCardinals: true
    layers:
    - state: icon
      map: ["enum.LatheVisualLayers.IsRunning"]
    - state: unlit
      shader: unshaded
      map: ["enum.PowerDeviceVisualLayers.Powered"]
    - state: inserting
      map: ["enum.MaterialStorageVisualLayers.Inserting"]
    - state: panel
      map: ["enum.WiresVisualLayers.MaintenancePanel"]
#  - type: Machine
#    board: ProtolatheMachineCircuitboard
  - type: MaterialStorage
    whitelist:
      tags:
      - Sheet
      - RawMaterial
      - Ingot
      - Wooden
      - ClothMade
      - Gauze
      - Metal
      - Scrap
  - type: Lathe
    idleState: icon
    runningState: building
    staticRecipes:
    - SiriusPlasmaCartridge
    - SiriusPlasmaCartridgeMultiplas
    - SiriusMicrofusionCell
    - SiriusPowerCellSmall
    - SiriusCartridgePistol5
    - SiriusMagazineMinigun5mm
    - SiriusPlasmaRifle
    - SiriusPlasmaRifleAuto
    - SiriusLaserRifle
    - SiriusLaserRifleAER12
    - SiriusLaserPistol
    - SiriusClothingOuterPowerArmorT45Enclave
    - SiriusClothingOuterPowerArmorT51Enclave
    - SiriusClothingOuterPowerArmorT60Enclave
    - SiriusClothingOuterPowerArmorX01Enclave
    - SiriusClothingOuterPowerArmorX02Enclave
